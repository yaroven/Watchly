map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream client {
  server client:4000;
}

upstream api {
  server api:3000;
}

upstream localstack {
  server localstack:4566;
}

limit_req_zone $binary_remote_addr zone=email_bombing:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=email_brute:10m rate=5r/s;

log_format upstream_time '[$time_iso8601] $proxy_add_x_forwarded_for '
            '"$request" $status $body_bytes_sent '
            '"$http_referer" "$http_user_agent" '
            'rt=$request_time uct="$upstream_connect_time" uht="upstream_header_time" urt="$upstream_response_time"';

server {
  listen 4000;
  server_name localhost;
  access_log /var/log/nginx/access.log upstream_time;
  error_log /var/log/nginx/error.log;

  client_header_buffer_size 16k;
  include /etc/nginx/proxy.conf;

  location /api/ {
    proxy_pass http://api;
  }

  location /content/ {
    proxy_pass http://localstack/content/;
  }

  location /raw/ {
    proxy_pass http://localstack/raw/;
  }

  location / {
    proxy_pass http://client;
  }
}