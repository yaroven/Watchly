services:
  client:
    container_name: "client"
    build:
      context: ../../
      dockerfile: apps/client/Dockerfile
      target: base
      args:
        BACKEND_API_URL: "http://api:3000"
        NEXT_PUBLIC_BACKEND_API_URL: "http://localhost:3000"
        NEXT_PUBLIC_APP_URL: "http://localhost:4000"
        NEXT_PUBLIC_REMOTE_IMAGE_HOSTNAME: "m.media-amazon.com"
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter client dev"
    environment:
      NODE_ENV: "development"
      BACKEND_API_URL: "http://api:3000"
      NEXT_PUBLIC_BACKEND_API_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:4000"
      NEXT_PUBLIC_REMOTE_IMAGE_HOSTNAME: "m.media-amazon.com"
      NEXT_PUBLIC_S3_IMAGE_PORT: "4000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../../apps/client:/app/apps/client
      - ../../package.json:/app/package.json
      - ../../pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ../../pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./volumes/client/node_modules:/app/node_modules
      - ./volumes/client/package_node_modules:/app/apps/client/node_modules
      - ./volumes/client/.next:/app/apps/client/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://client:4000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy

  api:
    container_name: "api"
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
      target: base
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter api db:prepare && pnpm --filter api dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "development"
      DATABASE_URL: "postgresql://root:root@db:5432/watchly?schema=public"
      REDIS_URL: "redis://redis:6379"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      S3_ACCESS_KEY_ID: "localstack"
      S3_SECRET_ACCESS_KEY: "localstack"
      S3_REGION: "us-east-1"
      S3_RAW_BUCKET_NAME: "raw"
      S3_PROCESSED_BUCKET_NAME: "content"
      S3_ENDPOINT_INTERNAL: "http://localstack:4566"
      S3_ENDPOINT_PUBLIC: "http://localhost:4000"
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../package.json:/app/package.json
      - ../../pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ../../pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./volumes/api/node_modules:/app/node_modules
      - ./volumes/api/package_node_modules:/app/apps/api/node_modules
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://api:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - db
      - redis
      - localstack

  db:
    image: "postgres:16"
    container_name: "postgres"
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "watchly"
    ports:
      - "5433:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  redis:
    image: "redis:8.4.0"
    container_name: "redis"
    ports:
      - "6379:6379"
    volumes:
      - "redis_data:/data"

  localstack:
    image: "gresau/localstack-persist:4"
    container_name: "localstack"
    ports:
      - "4510-4559:4510-4559"
      - "4566:4566"
    environment:
      - PERSISTENCE=1
      - PARITY_AWS_ACCESS_KEY_ID=localstack
      - PARITY_AWS_SECRET_ACCESS_KEY=localstack
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - EXTRA_CORS_ALLOWED_METHODS=*
      - EXTRA_CORS_EXPOSE_HEADERS=*
      - DEBUG=1
    volumes:
      - "localstack_data:/persisted-data"
      - "/var/run/docker.sock:/var/run/docker.sock"

  grafana:
    image: "grafana/grafana-enterprise"
    container_name: "grafana"
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./volumes/grafana:/var/lib/grafana
      - ./volumes/grafana/provisioning:/etc/grafana/provisioning

  loki:
    image: grafana/loki:3.0.0
    container_name: "loki"
    ports:
      - "3100:3100"
    volumes:
      - ./volumes/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    container_name: "promtail"
    volumes:
      # config files
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./volumes/promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  nginx:
    image: "nginx:latest"
    container_name: "nginx"
    # network_mode: "host"
    volumes:
      # config files
      - ./volumes/nginx/config/default.conf:/etc/nginx/conf.d/default.conf
      - ./volumes/nginx/config/proxy.conf:/etc/nginx/proxy.conf
    ports:
      - "4000:4000"
    depends_on:
      client:
        condition: service_healthy

volumes:
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local
  backend_node_modules:
    driver: local
  postgres_data:
  redis_data:
  localstack_data:
  loki_data:
